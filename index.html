<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2D4464" id="theme-meta-color">
  <meta name="description" content="Agenda Profissional — Anderson Vale, Cirurgião-Dentista, CRO-PI 006903">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AV Agenda">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">

  <title>AV Agenda — Anderson Vale</title>
</head>
<body class="theme-navy">

<!-- SPLASH SCREEN -->
<div id="splash" aria-hidden="true">
  <div class="splash-inner">
    <div class="splash-logo-wrap">
      <img src="icons/icon-white.png" class="splash-logo" alt="AV Agenda">
    </div>
    <div class="splash-name">Anderson Vale</div>
    <div class="splash-cro">Cirurgião-Dentista</div>
    <div class="splash-bar-wrap">
      <div class="splash-bar"></div>
    </div>
  </div>
</div>

<div id="app">

  <!-- HEADER -->
  <header class="app-hdr">
    <div class="hdr-logo">
      <img src="icons/icon-192.png" alt="AV" class="hdr-logo-icon" id="hdr-icon">
      <div class="hdr-logo-text">
        <span class="hdr-name">Anderson Vale</span>
        <span class="hdr-sub">Cirurgião-Dentista</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="hdr-date-wrap">
        <div class="hdr-date-dow" id="hdr-dow">Hoje</div>
        <div class="hdr-date-full" id="hdr-date"></div>
      </div>
      <button class="hdr-btn" id="btn-notify" title="Configurações de notificação">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="notif-dot" id="notif-dot"></span>
      </button>
      <button class="hdr-btn hidden" id="install-btn" title="Instalar app" style="color:var(--acc)">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- BODY -->
  <div class="app-body">

    <!-- SIDEBAR (desktop) -->
    <nav class="sidebar">
      <div class="sidebar-nav">
        <button class="sb-item active" data-view="today">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            <line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/>
          </svg>
          Hoje
          <span class="sb-badge" id="sb-badge" style="display:none">0</span>
        </button>
        <button class="sb-item" data-view="week">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Semana
        </button>
        <button class="sb-item" data-view="month">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            <rect x="8" y="14" width="3" height="3"/><rect x="13" y="14" width="3" height="3"/>
          </svg>
          Calendário
        </button>
        <button class="sb-item" data-view="patients">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Pacientes
        </button>
        <button class="sb-item" data-view="settings">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Configurações
        </button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">
      <div class="view-wrap" id="view-wrap">
        <!-- Rendered by JS -->
        <div class="empty" style="padding-top:80px">
          <div class="spinner"></div>
        </div>
      </div>
    </main>

  </div><!-- /app-body -->

  <!-- BOTTOM NAV (mobile) -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" data-view="today">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/>
      </svg>
      <span>Hoje</span>
      <span class="nav-btn-badge" style="display:none">0</span>
    </button>
    <button class="nav-btn" data-view="week">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Semana</span>
    </button>
    <button class="nav-btn" data-view="month">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <rect x="8" y="14" width="2" height="2"/><rect x="13" y="14" width="2" height="2"/>
      </svg>
      <span>Mês</span>
    </button>
    <button class="nav-btn" data-view="patients">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Pacientes</span>
    </button>
    <button class="nav-btn" data-view="settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Config</span>
    </button>
  </nav>

  <!-- FAB -->
  <button class="fab" id="fab-add" title="Novo Agendamento" aria-label="Novo Agendamento">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- MODAL OVERLAY -->
  <div class="modal-ovl" id="modal-ovl" role="dialog" aria-modal="true">
    <div class="modal-sheet" id="modal-sheet">
      <div class="modal-handle"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- INSTALL PROMPT -->
  <div class="install-prompt" id="install-prompt" role="complementary" aria-label="Instalar aplicativo">
    <div class="ip-card">
      <button class="ip-close" id="ip-close" aria-label="Fechar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="ip-top">
        <div class="ip-icon-wrap">
          <img src="icons/icon-192.png" class="ip-icon" id="ip-icon" alt="AV Agenda">
          <span class="ip-new-dot"></span>
        </div>
        <div class="ip-text">
          <div class="ip-title">Instalar AV Agenda</div>
          <div class="ip-sub">Acesso rápido · Funciona offline · Sem abrir navegador</div>
        </div>
      </div>
      <div class="ip-btns">
        <button class="ip-btn-dismiss" id="ip-dismiss">Agora não</button>
        <button class="ip-btn-install" id="ip-install">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Instalar App
        </button>
      </div>
    </div>
  </div>

  <!-- ONBOARDING OVERLAY -->
  <div class="onboard-ovl" id="onboard-ovl" role="dialog" aria-modal="true" aria-label="Configuração inicial">
    <div class="onboard-sheet" id="onboard-sheet"></div>
  </div>

</div><!-- /app -->

<style>
/* Spinner for loading state */
.spinner {
  width:32px; height:32px; margin:0 auto;
  border:3px solid var(--bdr);
  border-top-color:var(--acc);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
</style>

<script src="app.js"></script>
</body>
</html>
